seed: 42
dataset_split: train
# 先用小规模试 OpenAI，避免一次性跑太多题计费
max_documents: 167
max_questions_per_doc: 3

# openai | mock
llm_backend: openai
llm_model: gpt-4o-mini
# 是否使用额外的 LLM 调用来做“更严格”的幻觉判定（会增加 API 次数/费用）
use_llm_hallucination_eval: false
# 不要在 yaml 里写密钥。在终端执行: export OPENAI_API_KEY="sk-..."
# 可选: export OPENAI_BASE_URL="https://api.openai.com/v1"  （兼容接口可改）
openai_base_url: null
openai_api_key: null

vector_top_k: 5
chunk_max_words: 400
chunk_overlap_words: 50
embedding_model: null

toc_max_depth: 5
toc_stop_score: null
toc_selection: bm25

# Hybrid RAG: TOC navigation + scoped vector retrieval
hybrid_top_k: 3
hybrid_toc_max_depth: 4
hybrid_chunk_max_words: 220
hybrid_chunk_overlap_words: 40

# Optional for strict consistency across runs:
# if set to an existing predictions CSV, only question_ids in that CSV are evaluated.
# Example: outputs/predictions/vector_rag_predictions.csv
match_question_ids_from: null

# Ablation study only: caps data size so run_ablation.py does not use full max_documents.
# Main baselines still use max_documents / max_questions_per_doc above.
ablation_max_documents: 12
ablation_max_questions_per_doc: 2

output_dir: outputs/predictions
log_dir: outputs/logs
